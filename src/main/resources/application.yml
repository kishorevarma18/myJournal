spring:
  profiles:
    active: prod
    # Even though it is mentioned prod here if i hit ctrl+f5 then dev will be running because in vscode launch.json setting we have mentioned dev.
  redis:
    host: club-chivalrous-note-55789.db.redis.io
    port: 13098
    password: ${REDIS_PASSWORD}
    
  mail:
    host: smtp.gmail.com
    port: 587
    username: 18r01a0479@cmritonline.ac.in
    password: ${EMAIL_PASSWORD}
    properties:
        mail:
            smtp:
                auth: true
                starttls:
                    enable: true
                    required: true
  kafka:
    bootstrap-servers: localhost:9092
    # Producer Configuration
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    # Consumer Configuration
    consumer:
      group-id: myjournal-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      # Trusted Packages for Deserialization Security
      properties:
        spring:
          json:
            trusted:
              packages: com.jkv.myjournal.event
            # value:
            #   default:
            #     type: com.jkv.myjournal.event.EmailEvent

#so we create a package ./mvnw clean package -D spring.profiles.active=dev
