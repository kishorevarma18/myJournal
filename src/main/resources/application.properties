spring.application.name=myJournal
# the following properties are used for setting up the local mongodb server port to the project.
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=journaldb
# Enables automatic creation of indexes defined in your Entity classes.
# Without this set to 'true', the @Indexed(unique = true) annotation in your UserEntity will be ignored by Spring Data MongoDB.
spring.data.mongodb.auto-index-creation=true